name: Validate Anubis Breeding Analysis

on:
  push:
    paths:
      - "data/palworld-breeding/analysis/anubis_jolthog_route.json"
      - "data/palworld-breeding/breeding_rules.json"
      - "data/palworld-breeding/special_combinations.json"
      - "data/palworld-breeding/pal_values.json"
      - "data/palworld-breeding/manifest.json"
      - "services/breeding-api/**"
      - ".github/workflows/analyze-anubis-route.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/breeding-api
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: services/breeding-api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate current derived reference
        run: pnpm run generate

      - name: Validate analysis against schema-4 canonical rules
        run: pnpm run validate:release

      - name: Verify deterministic generation
        run: pnpm run check:deterministic

# The analysis is reviewed data. This workflow validates it and never rewrites or commits it.
