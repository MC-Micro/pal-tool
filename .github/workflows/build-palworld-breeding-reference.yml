name: Build Palworld Breeding Reference

on:
  push:
    paths:
      - ".github/workflows/build-palworld-breeding-reference.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build canonical breeding reference
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import hashlib
          import json
          import pathlib
          import urllib.request
          from datetime import datetime, timezone

          PST_COMMIT = "f12633787c82d1a652dab3235cabb785ec22134e"
          PALCALC_COMMIT = "dcff62b00014869d742762919410d95568023b8b"
          PST_URL = f"https://raw.githubusercontent.com/deafdudecomputers/PalworldSaveTools/{PST_COMMIT}/resources/game_data/breedingdata.json"
          PALCALC_DB_URL = f"https://raw.githubusercontent.com/tylercamp/palcalc/{PALCALC_COMMIT}/PalCalc.Model/db.json"
          PALCALC_BREEDING_URL = f"https://raw.githubusercontent.com/tylercamp/palcalc/{PALCALC_COMMIT}/PalCalc.Model/breeding.json"

          def fetch(url: str) -> bytes:
              request = urllib.request.Request(url, headers={"User-Agent": "pal-tool-breeding-reference"})
              with urllib.request.urlopen(request, timeout=180) as response:
                  return response.read()

          pst_raw = fetch(PST_URL)
          palcalc_db_raw = fetch(PALCALC_DB_URL)
          palcalc_breeding_raw = fetch(PALCALC_BREEDING_URL)
          pst = json.loads(pst_raw)
          palcalc = json.loads(palcalc_db_raw)
          palcalc_breeding = json.loads(palcalc_breeding_raw)

          out = pathlib.Path("data/palworld-breeding")
          out.mkdir(parents=True, exist_ok=True)

          pc_pals = sorted(palcalc["Pals"], key=lambda p: p.get("InternalIndex", 10**9))
          pc_by_internal = {p["InternalName"].lower(): p for p in pc_pals}
          pst_by_internal = {name.lower(): info for name, info in pst.get("pal_info", {}).items()}

          values = []
          missing_in_pst = []
          rank_mismatches = []
          rarity_mismatches = []

          for pc in pc_pals:
              key = pc["InternalName"].lower()
              info = pst_by_internal.get(key)
              if info is None:
                  missing_in_pst.append(pc["InternalName"])
                  info = {}

              pc_rank = int(pc.get("BreedingPower", 0) or 0)
              pc_rarity = int(pc.get("Rarity", 0) or 0)
              pst_rank = info.get("combi_rank")
              pst_rarity = info.get("rarity")

              if pst_rank is not None and int(pst_rank) != pc_rank:
                  rank_mismatches.append({
                      "internal_name": pc["InternalName"],
                      "palcalc": pc_rank,
                      "palworld_save_tools": int(pst_rank),
                  })
              if pst_rarity is not None and int(pst_rarity) != pc_rarity:
                  rarity_mismatches.append({
                      "internal_name": pc["InternalName"],
                      "palcalc": pc_rarity,
                      "palworld_save_tools": int(pst_rarity),
                  })

              localized = pc.get("LocalizedNames") or {}
              pal_id = pc.get("Id") or {}
              values.append({
                  "internal_name": pc["InternalName"],
                  "name_de": localized.get("de") or pc.get("Name") or info.get("name") or pc["InternalName"],
                  "name_en": localized.get("en") or pc.get("Name") or info.get("name") or pc["InternalName"],
                  "paldex_no": pal_id.get("PalDexNo"),
                  "is_variant": bool(pal_id.get("IsVariant", False)),
                  "combi_rank": pc_rank,
                  "rarity": pc_rarity,
                  "ignore_combi": None,
                  "combi_duplicate_priority": int(pc.get("BreedingPowerPriority", 0) or 0),
                  "internal_index": int(pc.get("InternalIndex", 10**9)),
              })

          values_by_internal = {v["internal_name"].lower(): v for v in values}

          # The current PalCalc breeding table contains every resolved parent pair. We use the exact
          # PalCalc formula to distinguish ordinary formula results from hard-coded unique combos.
          actual_breeding = []
          for entry in palcalc_breeding.get("Breeding", []):
              pa = entry.get("Parent1InternalName", "")
              pb = entry.get("Parent2InternalName", "")
              child = entry.get("ChildInternalName", "")
              if pa.lower() not in values_by_internal or pb.lower() not in values_by_internal or child.lower() not in values_by_internal:
                  continue
              actual_breeding.append({
                  "parent_a": pa,
                  "parent_a_gender": entry.get("Parent1Gender", "WILDCARD"),
                  "parent_b": pb,
                  "parent_b_gender": entry.get("Parent2Gender", "WILDCARD"),
                  "child": child,
              })

          def formula_child(parent_a: str, parent_b: str, excluded_children: set[str]):
              a = values_by_internal[parent_a.lower()]
              b = values_by_internal[parent_b.lower()]
              # Mirrors current PalCalc/game-data implementation. For today's ranks (all divisible by 10)
              # this is numerically identical to the exact arithmetic mean.
              target = (a["combi_rank"] + b["combi_rank"] + 1) // 2
              candidates = [
                  v for v in values
                  if v["internal_name"].lower() not in excluded_children and v["combi_rank"] > 0
              ]
              return min(candidates, key=lambda v: (
                  abs(v["combi_rank"] - target),
                  -v["combi_duplicate_priority"],
                  1 if v["is_variant"] else 0,
                  v["internal_index"],
              ))

          # Seed with unique children from the second source, then recover any omitted combos from
          # PalCalc's complete pair-result table. This also repairs source-localization omissions.
          excluded_children = {
              combo["child"].lower()
              for combo in pst.get("unique_combos", [])
              if combo.get("child", "").lower() in values_by_internal
          }

          for _ in range(20):
              discovered = set()
              for entry in actual_breeding:
                  if entry["parent_a"].lower() == entry["parent_b"].lower():
                      continue
                  expected = formula_child(entry["parent_a"], entry["parent_b"], excluded_children)
                  if expected["internal_name"].lower() != entry["child"].lower():
                      discovered.add(entry["child"].lower())
              new_children = discovered - excluded_children
              if not new_children:
                  break
              excluded_children.update(new_children)

          # Set the complete candidate-pool flag for every released Pal.
          for value in values:
              value["ignore_combi"] = value["internal_name"].lower() in excluded_children

          ignore_mismatches = []
          for value in values:
              info = pst_by_internal.get(value["internal_name"].lower())
              if info is not None and info.get("ignore_combi") is not None:
                  if bool(info["ignore_combi"]) != value["ignore_combi"]:
                      ignore_mismatches.append({
                          "internal_name": value["internal_name"],
                          "derived_from_palcalc": value["ignore_combi"],
                          "palworld_save_tools": bool(info["ignore_combi"]),
                      })

          def normalize_gender(gender: str) -> str:
              return "ANY" if gender in (None, "", "WILDCARD") else gender

          def combo_key(pa, ga, pb, gb, child):
              left = (pa.lower(), normalize_gender(ga))
              right = (pb.lower(), normalize_gender(gb))
              if right < left:
                  left, right = right, left
              return left + right + (child.lower(),)

          special_map = {}

          # PalCalc-derived hard overrides (cross-species only; same-species is a universal rule).
          for entry in actual_breeding:
              if entry["parent_a"].lower() == entry["parent_b"].lower():
                  continue
              expected = formula_child(entry["parent_a"], entry["parent_b"], excluded_children)
              if expected["internal_name"].lower() == entry["child"].lower():
                  continue
              key = combo_key(
                  entry["parent_a"], entry["parent_a_gender"],
                  entry["parent_b"], entry["parent_b_gender"],
                  entry["child"],
              )
              special_map[key] = entry

          # Merge the direct unique-combo export as an independent completeness check/fallback.
          filtered_pst_specials = []
          for combo in pst.get("unique_combos", []):
              pa = combo.get("parent_a", "")
              pb = combo.get("parent_b", "")
              child = combo.get("child", "")
              if pa.lower() == pb.lower():
                  continue
              if pa.lower() not in values_by_internal or pb.lower() not in values_by_internal or child.lower() not in values_by_internal:
                  filtered_pst_specials.append(combo)
                  continue
              key = combo_key(pa, "ANY", pb, "ANY", child)
              special_map.setdefault(key, {
                  "parent_a": values_by_internal[pa.lower()]["internal_name"],
                  "parent_a_gender": "ANY",
                  "parent_b": values_by_internal[pb.lower()]["internal_name"],
                  "parent_b_gender": "ANY",
                  "child": values_by_internal[child.lower()]["internal_name"],
              })

          specials = []
          for entry in special_map.values():
              a = values_by_internal[entry["parent_a"].lower()]
              b = values_by_internal[entry["parent_b"].lower()]
              child = values_by_internal[entry["child"].lower()]
              specials.append({
                  "parent_a_internal": a["internal_name"],
                  "parent_a_de": a["name_de"],
                  "parent_a_en": a["name_en"],
                  "parent_b_internal": b["internal_name"],
                  "parent_b_de": b["name_de"],
                  "parent_b_en": b["name_en"],
                  "child_internal": child["internal_name"],
                  "child_de": child["name_de"],
                  "child_en": child["name_en"],
                  "parent_a_gender": normalize_gender(entry.get("parent_a_gender")),
                  "parent_b_gender": normalize_gender(entry.get("parent_b_gender")),
              })
          specials.sort(key=lambda c: (
              c["child_de"].casefold(),
              c["parent_a_de"].casefold(),
              c["parent_b_de"].casefold(),
              c["parent_a_gender"],
              c["parent_b_gender"],
          ))

          # Exact duplicate-rank groups are a separate tie layer from equidistant different ranks.
          by_rank = {}
          for value in values:
              if value["combi_rank"] > 0 and not value["ignore_combi"]:
                  by_rank.setdefault(value["combi_rank"], []).append(value)
          duplicate_rank_groups = []
          for rank, group in sorted(by_rank.items()):
              if len(group) > 1:
                  duplicate_rank_groups.append({
                      "combi_rank": rank,
                      "winner_order": "higher CombiDuplicatePriority, then non-variant, then lower InternalIndex",
                      "pals": sorted(group, key=lambda v: (
                          -v["combi_duplicate_priority"],
                          1 if v["is_variant"] else 0,
                          v["internal_index"],
                      )),
                  })

          verified_tie_tests = [
              {
                  "parents": ["Braloha (rarity 8)", "Dynamoff (rarity 6)"],
                  "target_rank": 1215,
                  "candidates": ["Quivern (1210 / rarity 7)", "Azurobe Cryst (1220 / rarity 8)"],
                  "winner": "Quivern",
                  "reason": "rarity 7 exactly matches parent rarity average 7",
              },
              {
                  "parents": ["Shaolong (rarity 9)", "Helzephyr Lux (rarity 8)"],
                  "target_rank": 500,
                  "candidates": ["Astegon (490 / rarity 9)", "Dualith (510 / rarity 8)"],
                  "winner": "Dualith",
                  "reason": "both rarity distances are 0.5; lower child rarity wins",
              },
              {
                  "parents": ["Braloha (rarity 8)", "Jetragon (rarity 20)"],
                  "target_rank": 550,
                  "candidates": ["Univolt Cryst (540 / rarity 6)", "Silvegis (560 / rarity 8)"],
                  "winner": "Silvegis",
                  "reason": "rarity 8 is closer to parent rarity average 14",
              },
          ]

          ranks_not_divisible_by_10 = [
              value["internal_name"] for value in values if value["combi_rank"] % 10 != 0
          ]

          generated_at = datetime.now(timezone.utc).isoformat()
          rules = {
              "schema_version": 2,
              "generated_at_utc": generated_at,
              "game_reference": "Palworld 1.0 data snapshot",
              "decision_order": [
                  {
                      "order": 1,
                      "rule": "same_species_identity_override",
                      "description_de": "Sind beide Eltern dieselbe Pal-Art, ist das Kind wieder genau diese Pal-Art. Diese globale Regel wird vor der Sondertabelle und vor der Werteformel angewendet.",
                  },
                  {
                      "order": 2,
                      "rule": "unique_combo_override",
                      "description_de": "Steht das Elternpaar einschließlich möglicher Geschlechtsvorgabe in special_combinations.json, gilt das dort hinterlegte Kind unabhängig von der normalen Werteformel.",
                  },
                  {
                      "order": 3,
                      "rule": "eligible_candidate_pool",
                      "description_de": "Für die normale Formel werden nur Pals mit CombiRank > 0 und IgnoreCombi = false als mögliche Kinder verwendet. Spezialkinder können normale Eltern sein, entstehen aber nicht als normales Formelkind.",
                  },
                  {
                      "order": 4,
                      "rule": "rounded_average",
                      "formula": "target = floor((parent_a.combi_rank + parent_b.combi_rank + 1) / 2)",
                      "description_de": "Die aktuelle Implementierung rundet einen halben Ganzzahlwert formal auf. Da sämtliche aktuellen CombiRanks durch 10 teilbar sind, entspricht das derzeit immer exakt dem normalen arithmetischen Mittel.",
                  },
                  {
                      "order": 5,
                      "rule": "nearest_combi_rank",
                      "description_de": "Gewählt wird der zulässige Kind-Rang mit dem kleinsten absoluten Abstand zum Zielwert.",
                  },
                  {
                      "order": 6,
                      "rule": "equidistant_different_ranks_parent_rarity_average",
                      "formula": "parent_rarity_average = (parent_a.rarity + parent_b.rarity) / 2",
                      "description_de": "Sind ein niedrigerer und ein höherer Kind-Rang gleich weit entfernt, gewinnt der Kandidat, dessen Seltenheit näher am Seltenheitsdurchschnitt der Eltern liegt.",
                      "confidence": "verified_by_current_in_game_tests",
                  },
                  {
                      "order": 7,
                      "rule": "equidistant_rarity_lower_rarity",
                      "description_de": "Ist auch der Seltenheitsabstand gleich, gewinnt die niedrigere Kind-Seltenheit.",
                      "confidence": "verified_by_current_in_game_tests",
                  },
                  {
                      "order": 8,
                      "rule": "same_rank_duplicate_resolution",
                      "description_de": "Teilen mehrere zulässige Pals exakt denselben CombiRank, gewinnt die höhere CombiDuplicatePriority. Bei weiterem Gleichstand folgt die Nicht-Variante vor der Variante und danach die niedrigere InternalIndex-Reihenfolge.",
                      "confidence": "current_palcalc_field_semantics_and_order; only one current duplicate-rank group exists",
                  },
              ],
              "verified_equidistant_rank_tests": verified_tie_tests,
              "important_notes": [
                  "CombiDuplicatePriority ist nicht der allgemeine Gleichstandsentscheid zwischen zwei unterschiedlich hohen, gleich weit entfernten CombiRanks.",
                  "Die Paldeck-Nummer ist kein Zucht-Tie-Breaker.",
                  "Gleichartige Eltern werden durch die globale Identitätsregel behandelt und deshalb nicht als hunderte künstliche Sonderkombinationen in special_combinations.json geführt.",
                  "Bei künftigen Game-Updates müssen die drei gepinnten Quellen neu eingelesen und die Validierungsfelder geprüft werden.",
              ],
          }

          pst_cross_keys = set()
          for combo in pst.get("unique_combos", []):
              pa, pb, child = combo.get("parent_a", ""), combo.get("parent_b", ""), combo.get("child", "")
              if pa.lower() != pb.lower() and pa and pb and child:
                  pst_cross_keys.add(combo_key(pa, "ANY", pb, "ANY", child))
          final_keys = set(special_map)

          manifest = {
              "schema_version": 2,
              "generated_at_utc": generated_at,
              "sources": [
                  {
                      "repository": "deafdudecomputers/PalworldSaveTools",
                      "commit": PST_COMMIT,
                      "path": "resources/game_data/breedingdata.json",
                      "sha256": hashlib.sha256(pst_raw).hexdigest(),
                      "used_for": ["independent_rank_and_rarity_cross_check", "ignore_combi_cross_check", "direct_unique_combo_cross_check", "in_game_tested_tie_break_logic"],
                  },
                  {
                      "repository": "tylercamp/palcalc",
                      "commit": PALCALC_COMMIT,
                      "path": "PalCalc.Model/db.json",
                      "database_version": palcalc.get("Version"),
                      "sha256": hashlib.sha256(palcalc_db_raw).hexdigest(),
                      "used_for": ["released_pal_filter", "all_values", "German_and_English_names", "paldex", "rarity", "combi_duplicate_priority", "internal_index"],
                  },
                  {
                      "repository": "tylercamp/palcalc",
                      "commit": PALCALC_COMMIT,
                      "path": "PalCalc.Model/breeding.json",
                      "sha256": hashlib.sha256(palcalc_breeding_raw).hexdigest(),
                      "used_for": ["complete_resolved_parent_pair_table", "recovery_of_unique_combos_omitted_by_secondary_source", "gender_constraints"],
                  },
              ],
              "counts": {
                  "pal_values": len(values),
                  "cross_species_special_combinations": len(specials),
                  "special_only_children": len(excluded_children),
                  "duplicate_rank_groups": len(duplicate_rank_groups),
                  "rank_mismatches": len(rank_mismatches),
                  "rarity_mismatches": len(rarity_mismatches),
                  "ignore_combi_mismatches": len(ignore_mismatches),
                  "missing_in_palworld_save_tools": len(missing_in_pst),
                  "filtered_secondary_special_combinations": len(filtered_pst_specials),
                  "special_combinations_recovered_beyond_secondary_source": len(final_keys - pst_cross_keys),
                  "secondary_special_combinations_missing_from_final": len(pst_cross_keys - final_keys),
                  "ranks_not_divisible_by_10": len(ranks_not_divisible_by_10),
              },
              "validation": {
                  "rank_mismatches": rank_mismatches,
                  "rarity_mismatches": rarity_mismatches,
                  "ignore_combi_mismatches": ignore_mismatches,
                  "missing_in_palworld_save_tools": missing_in_pst,
                  "filtered_secondary_special_combinations": filtered_pst_specials,
                  "secondary_special_combinations_missing_from_final": [list(key) for key in sorted(pst_cross_keys - final_keys)],
                  "ranks_not_divisible_by_10": ranks_not_divisible_by_10,
              },
          }

          def write_json(name, data):
              (out / name).write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          write_json("pal_values.json", values)
          write_json("special_combinations.json", specials)
          write_json("duplicate_rank_groups.json", duplicate_rank_groups)
          write_json("breeding_rules.json", rules)
          write_json("manifest.json", manifest)

          with (out / "pal_values.csv").open("w", newline="", encoding="utf-8") as file:
              fields = list(values[0].keys())
              writer = csv.DictWriter(file, fieldnames=fields)
              writer.writeheader()
              writer.writerows(values)

          with (out / "special_combinations.csv").open("w", newline="", encoding="utf-8") as file:
              fields = list(specials[0].keys()) if specials else [
                  "parent_a_internal", "parent_a_de", "parent_a_en",
                  "parent_b_internal", "parent_b_de", "parent_b_en",
                  "child_internal", "child_de", "child_en",
                  "parent_a_gender", "parent_b_gender",
              ]
              writer = csv.DictWriter(file, fieldnames=fields)
              writer.writeheader()
              writer.writerows(specials)

          readme = f"""# Kanonische Palworld-Zuchtreferenz\n\nStand: automatisch erzeugter und quellenübergreifend validierter Palworld-1.0-Datensnapshot.\n\n## Verbindlicher Einsatz\n\nVor jeder Zuchtberechnung werden zuerst `breeding_rules.json`, danach `special_combinations.json` und anschließend `pal_values.json` verwendet. Eine Rechnung allein anhand von Paldeck-Nummern oder alten Internettabellen ist nicht zulässig.\n\n## Dateien\n\n- `pal_values.json` / `.csv`: alle aktuellen Pals mit CombiRank, Seltenheit, IgnoreCombi, CombiDuplicatePriority und interner Reihenfolge.\n- `special_combinations.json` / `.csv`: sämtliche quellenübergreifend rekonstruierten artverschiedenen Spezialpaarungen, die die normale Werteformel überschreiben.\n- `duplicate_rank_groups.json`: alle normalen Kind-Kandidaten, die exakt denselben CombiRank teilen.\n- `breeding_rules.json`: vollständige verbindliche Entscheidungsreihenfolge, globale Gleichart-Regel und verifizierte Tie-Break-Fälle.\n- `manifest.json`: Quellen, Commit-Pins, Hashes, Zähler und sämtliche Validierungsabweichungen.\n\n## Verbindliche Kurzregel\n\n1. Gleiche Pal-Art + gleiche Pal-Art ergibt dieselbe Pal-Art.\n2. Danach Spezialkombination einschließlich möglicher Geschlechtsvorgabe prüfen.\n3. Andernfalls nur normale Kind-Kandidaten (`IgnoreCombi = false`) verwenden.\n4. Zielwert `floor((A + B + 1) / 2)` bilden; bei den aktuellen durch zehn teilbaren Werten ist das exakt der Mittelwert.\n5. Kleinsten CombiRank-Abstand wählen.\n6. Bei gleich weit entfernten unterschiedlichen Rängen: Kind-Seltenheit möglichst nah am Seltenheitsdurchschnitt der Eltern; danach niedrigere Seltenheit.\n7. Bei exakt identischem Kind-Rang: höhere `CombiDuplicatePriority`, dann Nicht-Variante, dann niedrigere interne Reihenfolge.\n\n## Validierung\n\n- Pals: **{len(values)}**\n- Artverschiedene Spezialkombinationen: **{len(specials)}**\n- Spezialkinder außerhalb des normalen Kandidatenpools: **{len(excluded_children)}**\n- Gruppen mit identischem Rang: **{len(duplicate_rank_groups)}**\n- Abweichende CombiRanks zwischen den unabhängigen Quellen: **{len(rank_mismatches)}**\n- Abweichende Seltenheiten zwischen den unabhängigen Quellen: **{len(rarity_mismatches)}**\n- Nicht durch zehn teilbare aktuelle CombiRanks: **{len(ranks_not_divisible_by_10)}**\n\nDetails und jede Restunsicherheit stehen ausdrücklich in `breeding_rules.json` und `manifest.json`.\n"""
          (out / "README.md").write_text(readme, encoding="utf-8")
          PY

      - name: Commit generated reference
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/palworld-breeding
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "data: harden canonical Palworld 1.0 breeding reference"
            git push
          fi
