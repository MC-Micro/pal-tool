name: Validate Palworld Breeding Reference

on:
  push:
    paths:
      - "data/palworld-breeding/**"
      - "services/breeding-api/**"
      - ".github/workflows/build-palworld-breeding-reference.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-reference:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/breeding-api
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: services/breeding-api/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate derived reference
        run: pnpm run generate

      - name: Validate canonical and generated reference
        run: pnpm run validate:release

      - name: Verify deterministic generation
        run: pnpm run check:deterministic

      - name: Refuse stale or uncommitted generated artifacts
        shell: bash
        run: |
          changes="$(git status --porcelain --untracked-files=all -- generated/)"
          if [[ -n "$changes" ]]; then
            printf '%s\n' "$changes" >&2
            echo "Generated artifacts are not fully committed." >&2
            exit 1
          fi

      - name: Scan artifacts for secrets
        run: pnpm run scan:secrets

# Canonical data is intentionally never regenerated or committed automatically.
# A newer Palworld patch requires reviewed source updates and an explicit patch check.
